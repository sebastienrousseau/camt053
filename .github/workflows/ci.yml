name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest tests/ -v --tb=short

      - name: Upload coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run smoke tests
        run: poetry run pytest tests/ -m smoke -v --no-cov --tb=short

      - name: Verify examples
        run: |
          poetry run python examples/reverse_ac04.py
          poetry run python examples/parse_statement.py
          poetry run python examples/services_facade.py
          poetry run python examples/validate_identifiers.py
          poetry run python examples/rest_api_client.py

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff check
        run: poetry run ruff check camt053/

      - name: Black check
        run: poetry run black --check camt053/ tests/

      - name: Mypy
        run: poetry run mypy camt053/

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Bandit
        run: poetry run bandit -r camt053/ -c pyproject.toml || poetry run bandit -r camt053/ -s B101

  performance:
    # Benchmark suite + performance-regression guard (#11). Runs the ``perf``
    # benchmarks (parse + reversal generation on a representative statement)
    # outside the coverage gate and compares them against the committed
    # baseline, failing only on a large (>200% mean) regression so ordinary
    # runner-to-runner hardware variance does not produce false failures.
    name: Performance Benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run benchmarks (regression guard)
        run: >
          poetry run pytest tests/test_benchmarks.py
          -m perf --no-cov --benchmark-only
          --benchmark-compare=.benchmarks/baseline/0001_baseline.json
          --benchmark-compare-fail=mean:200%
          --benchmark-json=benchmark-results.json
          --tb=short

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json

  mutation:
    # Mutation testing (#26) -- advisory, NOT a required gate. It mutates the
    # package and re-runs the suite to surface weak tests. Allowed to fail so
    # surviving mutants are informational and never block a merge.
    name: Mutation Testing (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run mutmut (advisory)
        # Limit to the small, pure modules so the advisory run stays fast in
        # CI; drop the filter for a full local run (see CONTRIBUTING.md).
        run: |
          poetry run mutmut run "camt053.constants.*" || true
          poetry run mutmut run "camt053.models.*" || true

      - name: Mutation results summary
        if: always()
        run: poetry run mutmut results || true
