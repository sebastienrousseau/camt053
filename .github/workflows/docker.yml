name: Docker Publish

# Build and publish the REST API container image to the GitHub Container
# Registry (GHCR) on release (#31). This workflow is independent of the PyPI
# publish job in release.yml: a Docker failure cannot block the package
# release, and a package-release failure cannot block the image.
#
# It deliberately does NOT trigger on pull_request -- the PR-safe build-only
# validation lives in ci.yml (the ``docker-build`` job). Here we only ever run
# on a published release (push) or a manual dispatch.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v0.0.4)"
        required: true
        default: "latest"

# Least privilege at the top level; the publish job opts into packages: write.
permissions:
  contents: read

env:
  IMAGE: ghcr.io/sebastienrousseau/camt053

jobs:
  publish:
    name: Build And Push (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
