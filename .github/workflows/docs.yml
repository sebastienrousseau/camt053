name: Docs

# Build the Sphinx documentation (API reference + Design History File) and,
# on pushes to main, deploy it to GitHub Pages.
#
# Pull requests BUILD ONLY (no deploy), so a PR validates that the docs build
# cleanly without requiring Pages to be enabled on the repository.
#
# The push job enables Pages automatically (configure-pages `enablement: true`),
# so no manual Settings -> Pages step is required.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow the deploy job to publish to GitHub Pages via OIDC.
permissions:
  contents: read

# Allow one concurrent deployment; queue (do not cancel) in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    # `configure-pages` with `enablement: true` needs these to turn Pages on.
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install docs toolchain (hash-pinned)
        # Hash-pinned doc tooling + camt053's runtime deps. The package itself
        # is imported by autodoc from the repo root (docs/conf.py adds it to
        # sys.path), so no un-pinnable editable ``pip install -e .`` is needed.
        run: pip install --require-hashes -r requirements/docs.txt

      - name: Configure Pages
        # Only needed for the deploy path; harmless to skip on PRs.
        # `enablement: true` turns GitHub Pages on (build_type=workflow) on the
        # first run, so no manual Settings -> Pages step is required.
        if: github.event_name == 'push'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true

      - name: Build the Sphinx documentation
        # -W turns warnings into errors so a broken build fails the PR check.
        run: sphinx-build -b html -W docs _site

      - name: Upload the Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    # Deploy only on pushes to main, never on pull requests.
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
